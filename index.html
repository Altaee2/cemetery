<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجدول الدوري الحديث - الإصدار الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, minmax(0, 1fr));
            gap: 4px;
            padding: 10px;
            min-width: 1200px;
        }

        .element-card {
            aspect-ratio: 1 / 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 4px 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .element-card:hover {
            transform: scale(1.4);
            z-index: 50;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            border-color: #fff;
        }

        .element-number { position: absolute; top: 2px; right: 3px; font-size: 0.6rem; opacity: 0.7; }
        .element-symbol { font-weight: bold; font-size: 1.1rem; line-height: 1; margin-top: 6px; }
        .element-name-ar { font-size: 0.55rem; color: #fff; font-weight: 700; white-space: nowrap; }
        .element-name-en { font-size: 0.45rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
        .element-group { font-size: 0.4rem; color: #94a3b8; }

        /* Categories Colors */
        .alkali-metal { background: #7f1d1d; }
        .alkaline-earth { background: #7c2d12; }
        .transition-metal { background: #1e3a8a; }
        .post-transition { background: #064e3b; }
        .metalloid { background: #3f6212; }
        .nonmetal { background: #134e4a; }
        .noble-gas { background: #4c1d95; }
        .halogen { background: #831843; }
        .lanthanide { background: #4338ca; }
        .actinide { background: #701a75; }
        .unknown { background: #334155; }

        .table-container {
            overflow-x: auto;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 1rem;
            border: 1px solid #1e293b;
        }

        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="py-10 text-center">
        <h1 class="text-5xl font-black mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">الجدول الدوري التفاعلي</h1>
        <p class="text-slate-400 text-lg">استعراض شامل لجميع العناصر الـ 118 باللغتين العربية والإنجليزية</p>
    </header>

    <main class="max-w-[1400px] mx-auto px-4">
        <div class="table-container mb-12 p-4">
            <div id="periodic-table" class="periodic-table">
                <!-- Elements injected by JS -->
            </div>
            
            <!-- Lanthanides and Actinides spacing -->
            <div class="mt-8"></div>
            
            <div id="lanthanides-table" class="periodic-table" style="grid-template-rows: repeat(2, 1fr);">
                <!-- Lanthanides and Actinides injected here -->
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="details-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[100] hidden">
        <div class="bg-slate-900 border-2 border-blue-500/50 p-10 rounded-3xl max-w-lg w-full relative shadow-[0_0_50px_rgba(59,130,246,0.2)]">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-slate-400 hover:text-white text-3xl transition-transform hover:rotate-90">&times;</button>
            <div id="modal-body" class="text-center"></div>
        </div>
    </div>

    <footer class="bg-slate-900/50 border-t border-slate-800 py-8 mt-20 text-center">
        <div class="max-w-7xl mx-auto px-4">
            <p class="text-slate-400">تم التطوير وبرمجة الواجهة بواسطة</p>
            <h2 class="text-xl font-bold text-white mt-2 tracking-widest">جميع الحقوق محفوظة &copy; 2024</h2>
            <div class="mt-4 flex justify-center gap-4 text-sm text-blue-400/70">
                <span>كيمياء</span> • <span>برمجة</span> • <span>تعليم</span>
            </div>
        </div>
    </footer>

    <script>
        // Data for all 118 elements
        const elementsData = [
            {n:1, s:"H", nAr:"هيدروجين", nEn:"Hydrogen", c:"nonmetal", m:"1.008", r:1, col:1, g:1},
            {n:2, s:"He", nAr:"هيليوم", nEn:"Helium", c:"noble-gas", m:"4.002", r:1, col:18, g:18},
            {n:3, s:"Li", nAr:"ليثيوم", nEn:"Lithium", c:"alkali-metal", m:"6.94", r:2, col:1, g:1},
            {n:4, s:"Be", nAr:"بيريليوم", nEn:"Beryllium", c:"alkaline-earth", m:"9.012", r:2, col:2, g:2},
            {n:5, s:"B", nAr:"بورون", nEn:"Boron", c:"metalloid", m:"10.81", r:2, col:13, g:13},
            {n:6, s:"C", nAr:"كربون", nEn:"Carbon", c:"nonmetal", m:"12.011", r:2, col:14, g:14},
            {n:7, s:"N", nAr:"نيتروجين", nEn:"Nitrogen", c:"nonmetal", m:"14.007", r:2, col:15, g:15},
            {n:8, s:"O", nAr:"أكسجين", nEn:"Oxygen", c:"nonmetal", m:"15.999", r:2, col:16, g:16},
            {n:9, s:"F", nAr:"فلور", nEn:"Fluorine", c:"halogen", m:"18.998", r:2, col:17, g:17},
            {n:10, s:"Ne", nAr:"نيون", nEn:"Neon", c:"noble-gas", m:"20.180", r:2, col:18, g:18},
            {n:11, s:"Na", nAr:"صوديوم", nEn:"Sodium", c:"alkali-metal", m:"22.990", r:3, col:1, g:1},
            {n:12, s:"Mg", nAr:"ماغنسيوم", nEn:"Magnesium", c:"alkaline-earth", m:"24.305", r:3, col:2, g:2},
            {n:13, s:"Al", nAr:"ألومنيوم", nEn:"Aluminum", c:"post-transition", m:"26.982", r:3, col:13, g:13},
            {n:14, s:"Si", nAr:"سيليكون", nEn:"Silicon", c:"metalloid", m:"28.085", r:3, col:14, g:14},
            {n:15, s:"P", nAr:"فسفور", nEn:"Phosphorus", c:"nonmetal", m:"30.974", r:3, col:15, g:15},
            {n:16, s:"S", nAr:"كبريت", nEn:"Sulfur", c:"nonmetal", m:"32.06", r:3, col:16, g:16},
            {n:17, s:"Cl", nAr:"كلور", nEn:"Chlorine", c:"halogen", m:"35.45", r:3, col:17, g:17},
            {n:18, s:"Ar", nAr:"أرجون", nEn:"Argon", c:"noble-gas", m:"39.948", r:3, col:18, g:18},
            // ... Simplified for brevity in the code, but the logic below covers all 118 with dynamic generation.
        ];

        // Generator for all elements (Atomic logic)
        async function fetchAllElements() {
            // Using a comprehensive dataset for all 118
            const fullData = await fetch('https://raw.githubusercontent.com/Bowserinator/Periodic-Table-JSON/master/PeriodicTableJSON.json')
                .then(res => res.json())
                .then(data => data.elements);

            const arNames = {
                "Hydrogen": "هيدروجين", "Helium": "هيليوم", "Lithium": "ليثيوم", "Beryllium": "بيريليوم", "Boron": "بورون",
                "Carbon": "كربون", "Nitrogen": "نيتروجين", "Oxygen": "أكسجين", "Fluorine": "فلور", "Neon": "نيون",
                "Sodium": "صوديوم", "Magnesium": "ماغنسيوم", "Aluminum": "ألومنيوم", "Silicon": "سيليكون", "Phosphorus": "فسفور",
                "Sulfur": "كبريت", "Chlorine": "كلور", "Argon": "أرجون", "Potassium": "بوتاسيوم", "Calcium": "كالسيوم",
                "Scandium": "سكانديوم", "Titanium": "تيتانيوم", "Vanadium": "فاناديوم", "Chromium": "كروم", "Manganese": "منغنيز",
                "Iron": "حديد", "Cobalt": "كوبالت", "Nickel": "نيكل", "Copper": "نحاس", "Zinc": "زنك", "Gallium": "غاليوم",
                "Germanium": "جرمانيوم", "Arsenic": "زرنيخ", "Selenium": "سيلينيوم", "Bromine": "بروم", "Krypton": "كريبتون",
                "Rubidium": "روبيديوم", "Strontium": "سترونشيوم", "Yttrium": "يتريوم", "Zirconium": "زركونيوم", "Niobium": "نيوبيوم",
                "Molybdenum": "موليبدينوم", "Technetium": "تكنيشيوم", "Ruthenium": "روثينيوم", "Rhodium": "روديوم", "Palladium": "بالاديوم",
                "Silver": "فضة", "Cadmium": "كادميوم", "Indium": "إنديوم", "Tin": "قصدير", "Antimony": "أنتيمون", "Tellurium": "تيلوريوم",
                "Iodine": "يود", "Xenon": "زينون", "Cesium": "سيزيوم", "Barium": "باريوم", "Lanthanum": "لانثانوم", "Cerium": "سيريوم",
                "Praseodymium": "براسوديميوم", "Neodymium": "نيوديميوم", "Promethium": "بروميثيوم", "Samarium": "ساماريوم", "Europium": "أوروبيوم",
                "Gadolinium": "جادولينيوم", "Terbium": "تيربيوم", "Dysprosium": "ديسبروسيوم", "Holmium": "هولميوم", "Erbium": "إربيوم",
                "Thulium": "ثوليوم", "Ytterbium": "يتيربيوم", "Lutetium": "لوتيشيوم", "Hafnium": "هافنيوم", "Tantalum": "تانتالوم",
                "Tungsten": "تنجستن", "Rhenium": "رينيوم", "Osmium": "أوسميوم", "Iridium": "إيريديوم", "Platinum": "بلاتين",
                "Gold": "ذهب", "Mercury": "زئبق", "Thallium": "ثاليوم", "Lead": "رصاص", "Bismuth": "بزموت", "Polonium": "بولونيوم",
                "Astatine": "أستاتين", "Radon": "رادون", "Francium": "فرانسيوم", "Radium": "راديوم", "Actinium": "أكتينيوم",
                "Thorium": "ثوريوم", "Protactinium": "بروتاكتينيوم", "Uranium": "يورانيوم", "Neptunium": "نبتونيوم", "Plutonium": "بلوتونيوم",
                "Americium": "أميريسيوم", "Curium": "كوريوم", "Berkelium": "بركليوم", "Californium": "كاليفورنيوم", "Einsteinium": "أينشتاينيوم",
                "Fermium": "فيرميوم", "Mendelevium": "مندليفيوم", "Nobelium": "نوبليوم", "Lawrencium": "لورنسيوم", "Rutherfordium": "رذرفورديوم",
                "Dubnium": "دوبنيوم", "Seaborgium": "سيبورجيوم", "Bohrium": "بوريوم", "Hassium": "هاسيوم", "Meitnerium": "مايتنيريوم",
                "Darmstadtium": "دارمشتاتيوم", "Roentgenium": "رونتجينيوم", "Copernicium": "كوبرنيسيوم", "Nihonium": "نيهونيوم",
                "Flerovium": "فليروفيوم", "Moscovium": "موسكوفيوم", "Livermorium": "ليفيرموريوم", "Tennessine": "تنسين", "Oganesson": "أوجانيسون"
            };

            const table = document.getElementById('periodic-table');
            const lanth = document.getElementById('lanthanides-table');

            fullData.forEach(el => {
                const card = document.createElement('div');
                const catClass = el.category.replace(/\s+/g, '-').toLowerCase();
                card.className = `element-card ${catClass}`;
                
                card.innerHTML = `
                    <span class="element-number">${el.number}</span>
                    <span class="element-symbol">${el.symbol}</span>
                    <span class="element-name-ar">${arNames[el.name] || el.name}</span>
                    <span class="element-name-en">${el.name}</span>
                    <span class="element-group">G: ${el.group || 'N/A'}</span>
                `;

                card.onclick = () => showDetails(el, arNames[el.name]);

                if ((el.number >= 57 && el.number <= 71) || (el.number >= 89 && el.number <= 103)) {
                    // Position bottom rows for Lanthanides and Actinides
                    card.style.gridColumn = (el.number >= 57 && el.number <= 71) ? (el.number - 56 + 3) : (el.number - 88 + 3);
                    lanth.appendChild(card);
                } else {
                    card.style.gridRow = el.ypos;
                    card.style.gridColumn = el.xpos;
                    table.appendChild(card);
                }
            });
        }

        function showDetails(el, arName) {
            const modal = document.getElementById('details-modal');
            const body = document.getElementById('modal-body');
            
            body.innerHTML = `
                <div class="flex flex-col items-center">
                    <span class="text-blue-500 font-bold mb-2">#${el.number}</span>
                    <h2 class="text-7xl font-black text-white mb-2">${el.symbol}</h2>
                    <h3 class="text-3xl text-blue-400 font-bold">${arName}</h3>
                    <p class="text-slate-400 mb-6 italic">${el.name}</p>
                    
                    <div class="grid grid-cols-2 gap-4 w-full text-right">
                        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                            <p class="text-xs text-slate-500">الكتلة الذرية</p>
                            <p class="text-lg font-bold text-emerald-400">${el.atomic_mass.toFixed(3)}</p>
                        </div>
                        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                            <p class="text-xs text-slate-500">التصنيف</p>
                            <p class="text-md font-bold text-orange-400 text-sm">${el.category}</p>
                        </div>
                        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                            <p class="text-xs text-slate-500">المجموعة / الزمرة</p>
                            <p class="text-lg font-bold">${el.group || 'غير محدد'}</p>
                        </div>
                        <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                            <p class="text-xs text-slate-500">اكتشف بواسطة</p>
                            <p class="text-sm font-bold">${el.discovered_by || 'قديم'}</p>
                        </div>
                    </div>

                    <div class="mt-6 w-full text-sm text-slate-400 text-right leading-relaxed line-clamp-3">
                        ${el.summary}
                    </div>

                    <button onclick="closeModal()" class="mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-10 rounded-full transition-all w-full shadow-lg shadow-blue-900/40">إغلاق النافذة</button>
                </div>
            `;
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        window.onload = fetchAllElements;
    </script>
</body>
</html>
