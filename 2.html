<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجدول الدوري الحديث - النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: #f1f5f9;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
        }

        /* Periodic Table Grid Layout */
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, minmax(0, 1fr));
            gap: 6px;
            padding: 10px;
            min-width: 1200px;
        }

        .element-card {
            aspect-ratio: 1 / 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 6px 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
        }

        .element-card:hover {
            transform: scale(1.35) translateY(-5px);
            z-index: 50;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(59, 130, 246, 0.5);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .element-card.dimmed {
            opacity: 0.2;
            filter: grayscale(0.8);
            transform: scale(0.95);
        }

        .element-number { position: absolute; top: 4px; right: 6px; font-size: 0.65rem; font-weight: bold; opacity: 0.8; }
        .element-symbol { font-weight: 900; font-size: 1.3rem; line-height: 1; margin-top: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .element-name-ar { font-size: 0.6rem; color: #fff; font-weight: 600; white-space: nowrap; margin-top: 2px; }
        .element-name-en { font-size: 0.45rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
        .element-weight { font-size: 0.5rem; color: #94a3b8; margin-top: auto; }

        /* Categories Colors - Refined Palette */
        .alkali-metal { border-left: 4px solid #ef4444; background: linear-gradient(135deg, rgba(127, 29, 29, 0.8), rgba(69, 10, 10, 0.8)); }
        .alkaline-earth { border-left: 4px solid #f97316; background: linear-gradient(135deg, rgba(124, 45, 18, 0.8), rgba(67, 20, 7, 0.8)); }
        .transition-metal { border-left: 4px solid #3b82f6; background: linear-gradient(135deg, rgba(30, 58, 138, 0.8), rgba(23, 37, 84, 0.8)); }
        .post-transition { border-left: 4px solid #10b981; background: linear-gradient(135deg, rgba(6, 78, 59, 0.8), rgba(2, 44, 34, 0.8)); }
        .metalloid { border-left: 4px solid #84cc16; background: linear-gradient(135deg, rgba(63, 98, 18, 0.8), rgba(26, 46, 5, 0.8)); }
        .nonmetal { border-left: 4px solid #06b6d4; background: linear-gradient(135deg, rgba(19, 78, 74, 0.8), rgba(13, 54, 51, 0.8)); }
        .noble-gas { border-left: 4px solid #a855f7; background: linear-gradient(135deg, rgba(76, 29, 149, 0.8), rgba(46, 16, 101, 0.8)); }
        .halogen { border-left: 4px solid #ec4899; background: linear-gradient(135deg, rgba(131, 24, 67, 0.8), rgba(77, 10, 39, 0.8)); }
        .lanthanide { border-left: 4px solid #6366f1; background: linear-gradient(135deg, rgba(67, 56, 202, 0.8), rgba(49, 46, 129, 0.8)); }
        .actinide { border-left: 4px solid #d946ef; background: linear-gradient(135deg, rgba(112, 26, 117, 0.8), rgba(74, 4, 78, 0.8)); }

        .table-container {
            overflow-x: auto;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            background: rgba(30, 41, 59, 0.5);
        }
        .filter-btn:hover, .filter-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
            transform: translateY(-2px);
        }

        #search-input {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s;
        }
        #search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            outline: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-pop { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="pb-10">

    <header class="py-12 text-center relative z-10">
        <h1 class="text-6xl font-black mb-4 bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 bg-clip-text text-transparent">الجدول الدوري الحديث</h1>
        <p class="text-slate-400 text-xl font-light">موسوعة العناصر الكيميائية التفاعلية</p>
        
        <!-- Search & Filter Controls -->
        <div class="mt-10 max-w-4xl mx-auto px-4 space-y-6">
            <div class="relative max-w-md mx-auto">
                <input type="text" id="search-input" placeholder="ابحث بالاسم، الرمز، أو الرقم الذري..." 
                       class="w-full py-4 px-6 pr-12 rounded-2xl text-white text-center">
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-blue-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <div id="filter-container" class="flex flex-wrap justify-center gap-2">
                <button class="filter-btn active" data-cat="all">الكل</button>
                <button class="filter-btn" data-cat="alkali-metal">فلزات قلوية</button>
                <button class="filter-btn" data-cat="alkaline-earth">قلوية ترابية</button>
                <button class="filter-btn" data-cat="transition-metal">فلزات انتقالية</button>
                <button class="filter-btn" data-cat="noble-gas">غازات خاملة</button>
                <button class="filter-btn" data-cat="nonmetal">لافلزات</button>
                <button class="filter-btn" data-cat="metalloid">أشباه فلزات</button>
                <button class="filter-btn" data-cat="halogen">هالوجينات</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1500px] mx-auto px-4 relative z-10">
        <div class="table-container mb-12 p-6 backdrop-blur-xl">
            <div id="periodic-table" class="periodic-table">
                <!-- Main Elements -->
            </div>
            
            <div class="flex items-center gap-8 mt-12 mb-4 px-10">
                <div class="h-px bg-slate-700 flex-grow"></div>
                <span class="text-slate-500 text-sm font-bold tracking-widest uppercase">سلسلة اللانثانيدات والأكتينيدات</span>
                <div class="h-px bg-slate-700 flex-grow"></div>
            </div>
            
            <div id="lanthanides-table" class="periodic-table">
                <!-- Lanthanides and Actinides -->
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="details-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 z-[100] hidden">
        <div class="bg-slate-900 border border-blue-500/30 p-1 rounded-3xl max-w-2xl w-full relative overflow-hidden shadow-2xl">
            <div class="p-8 md:p-12 relative z-10">
                <button onclick="closeModal()" class="absolute top-6 left-6 text-slate-400 hover:text-white text-3xl transition-transform hover:scale-110">&times;</button>
                <div id="modal-body"></div>
            </div>
            <!-- Background Decorative Symbol -->
            <div id="modal-bg-symbol" class="absolute -bottom-10 -right-10 text-[20rem] font-black text-white/5 pointer-events-none select-none"></div>
        </div>
    </div>

    <footer class="bg-slate-900/80 border-t border-slate-800 py-12 text-center relative z-10">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-center items-center gap-4 mb-6">
                <div class="h-12 w-12 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold text-2xl shadow-lg shadow-blue-500/20">H</div>
                <div class="h-12 w-12 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-600 flex items-center justify-center text-white font-bold text-2xl shadow-lg shadow-emerald-500/20">C</div>
                <div class="h-12 w-12 rounded-2xl bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center text-white font-bold text-2xl shadow-lg shadow-purple-500/20">O</div>
            </div>
            <p class="text-slate-400 text-sm mb-2">تم تصميم وتطوير هذه المنصة التعليمية بواسطة</p>
            <h2 class="text-2xl font-black text-white mt-1 tracking-wider uppercase">فريق التطوير والابتكار</h2>
            
            <!-- الرابط المضاف -->
            <div class="mt-4">
                <a href="http://www.ali-altaee.free.nf" target="_blank" class="text-blue-400 hover:text-blue-300 transition-colors font-mono text-sm underline decoration-blue-500/30 underline-offset-4">
                    www.ali-altaee.free.nf
                </a>
            </div>

            <div class="flex justify-center gap-3 mt-6">
                <span class="px-4 py-1 bg-blue-500/10 text-blue-400 text-xs rounded-full border border-blue-500/20">تفاعل ذكي</span>
                <span class="px-4 py-1 bg-emerald-500/10 text-emerald-400 text-xs rounded-full border border-emerald-500/20">بيانات دقيقة</span>
                <span class="px-4 py-1 bg-purple-500/10 text-purple-400 text-xs rounded-full border border-purple-500/20">تصميم عصري</span>
            </div>
            <p class="text-slate-600 text-xs mt-10">جميع الحقوق محفوظة &copy; 2024</p>
        </div>
    </footer>

    <script>
        const arNames = {
            "Hydrogen": "هيدروجين", "Helium": "هيليوم", "Lithium": "ليثيوم", "Beryllium": "بيريليوم", "Boron": "بورون",
            "Carbon": "كربون", "Nitrogen": "نيتروجين", "Oxygen": "أكسجين", "Fluorine": "فلور", "Neon": "نيون",
            "Sodium": "صوديوم", "Magnesium": "ماغنسيوم", "Aluminum": "ألومنيوم", "Silicon": "سيليكون", "Phosphorus": "فسفور",
            "Sulfur": "كبريت", "Chlorine": "كلور", "Argon": "أرجون", "Potassium": "بوتاسيوم", "Calcium": "كالسيوم",
            "Scandium": "سكانديوم", "Titanium": "تيتانيوم", "Vanadium": "فاناديوم", "Chromium": "كروم", "Manganese": "منغنيز",
            "Iron": "حديد", "Cobalt": "كوبالت", "Nickel": "نيكل", "Copper": "نحاس", "Zinc": "زنك", "Gallium": "غاليوم",
            "Germanium": "جرمانيوم", "Arsenic": "زرنيخ", "Selenium": "سيلينيوم", "Bromine": "بروم", "Krypton": "كريبتون",
            "Rubidium": "روبيديوم", "Strontium": "سترونشيوم", "Yttrium": "يتريوم", "Zirconium": "زركونيوم", "Niobium": "نيوبيوم",
            "Molybdenum": "موليبدينوم", "Technetium": "تكنيشيوم", "Ruthenium": "روثينيوم", "Rhodium": "روديوم", "Palladium": "بالاديوم",
            "Silver": "فضة", "Cadmium": "كادميوم", "Indium": "إنديوم", "Tin": "قصدير", "Antimony": "أنتيمون", "Tellurium": "تيلوريوم",
            "Iodine": "يود", "Xenon": "زينون", "Cesium": "سيزيوم", "Barium": "باريوم", "Lanthanum": "لانثانوم", "Cerium": "سيريوم",
            "Praseodymium": "براسوديميوم", "Neodymium": "نيوديميوم", "Promethium": "بروميثيوم", "Samarium": "ساماريوم", "Europium": "أوروبيوم",
            "Gadolinium": "جادولينيوم", "Terbium": "تيربيوم", "Dysprosium": "ديسبروسيوم", "Holmium": "هولميوم", "Erbium": "إربيوم",
            "Thulium": "ثوليوم", "Ytterbium": "يتيربيوم", "Lutetium": "لوتيشيوم", "Hafnium": "هافنيوم", "Tantalum": "تانتالوم",
            "Tungsten": "تنجستن", "Rhenium": "رينيوم", "Osmium": "أوسميوم", "Iridium": "إيريديوم", "Platinum": "بلاتين",
            "Gold": "ذهب", "Mercury": "زئبق", "Thallium": "ثاليوم", "Lead": "رصاص", "Bismuth": "بزموت", "Polonium": "بولونيوم",
            "Astatine": "أستاتين", "Radon": "رادون", "Francium": "فرانسيوم", "Radium": "راديوم", "Actinium": "أكتينيوم",
            "Thorium": "ثوريوم", "Protactinium": "بروتاكتينيوم", "Uranium": "يورانيوم", "Neptunium": "نبتونيوم", "Plutonium": "بلوتونيوم",
            "Americium": "أميريسيوم", "Curium": "كوريوم", "Berkelium": "بركليوم", "Californium": "كاليفورنيوم", "Einsteinium": "أينشتاينيوم",
            "Fermium": "فيرميوم", "Mendelevium": "مندليفيوم", "Nobelium": "نوبليوم", "Lawrencium": "لورنسيوم", "Rutherfordium": "رذرفورديوم",
            "Dubnium": "دوبنيوم", "Seaborgium": "سيبورجيوم", "Bohrium": "بوريوم", "Hassium": "هاسيوم", "Meitnerium": "مايتنيريوم",
            "Darmstadtium": "دارمشتاتيوم", "Roentgenium": "رونتجينيوم", "Copernicium": "كوبرنيسيوم", "Nihonium": "نيهونيوم",
            "Flerovium": "فليروفيوم", "Moscovium": "موسكوفيوم", "Livermorium": "ليفيرموريوم", "Tennessine": "تنسين", "Oganesson": "أوجانيسون"
        };

        let allElements = [];

        async function init() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/Bowserinator/Periodic-Table-JSON/master/PeriodicTableJSON.json');
                const data = await response.json();
                allElements = data.elements;
                renderTable(allElements);
                setupControls();
            } catch (error) {
                console.error("Error loading periodic table data", error);
            }
        }

        function renderTable(elementsToRender) {
            const mainTable = document.getElementById('periodic-table');
            const lanthTable = document.getElementById('lanthanides-table');
            mainTable.innerHTML = '';
            lanthTable.innerHTML = '';

            elementsToRender.forEach((el, index) => {
                const card = document.createElement('div');
                const catClass = el.category.replace(/\s+/g, '-').toLowerCase();
                card.className = `element-card ${catClass} animate-pop`;
                card.style.animationDelay = `${index * 5}ms`;
                card.dataset.number = el.number;
                card.dataset.symbol = el.symbol.toLowerCase();
                card.dataset.nameAr = (arNames[el.name] || '').toLowerCase();
                card.dataset.nameEn = el.name.toLowerCase();
                card.dataset.category = catClass;
                
                card.innerHTML = `
                    <span class="element-number">${el.number}</span>
                    <span class="element-symbol">${el.symbol}</span>
                    <span class="element-name-ar">${arNames[el.name] || el.name}</span>
                    <span class="element-name-en">${el.name}</span>
                    <span class="element-weight">${el.atomic_mass.toFixed(2)}</span>
                `;

                card.onclick = () => showDetails(el);

                if ((el.number >= 57 && el.number <= 71) || (el.number >= 89 && el.number <= 103)) {
                    card.style.gridColumn = (el.number >= 57 && el.number <= 71) ? (el.number - 56 + 2) : (el.number - 88 + 2);
                    lanthTable.appendChild(card);
                } else {
                    card.style.gridRow = el.ypos;
                    card.style.gridColumn = el.xpos;
                    mainTable.appendChild(card);
                }
            });
        }

        function setupControls() {
            const search = document.getElementById('search-input');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const cards = () => document.querySelectorAll('.element-card');

            search.oninput = (e) => {
                const query = e.target.value.toLowerCase().trim();
                cards().forEach(card => {
                    const match = card.dataset.number === query || 
                                  card.dataset.symbol.includes(query) || 
                                  card.dataset.nameAr.includes(query) || 
                                  card.dataset.nameEn.includes(query);
                    card.classList.toggle('dimmed', query !== '' && !match);
                });
            };

            filterBtns.forEach(btn => {
                btn.onclick = () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const cat = btn.dataset.cat;
                    cards().forEach(card => {
                        card.classList.toggle('dimmed', cat !== 'all' && !card.classList.contains(cat));
                    });
                };
            });
        }

        function showDetails(el) {
            const modal = document.getElementById('details-modal');
            const body = document.getElementById('modal-body');
            const bgSymbol = document.getElementById('modal-bg-symbol');
            const arName = arNames[el.name] || el.name;
            
            bgSymbol.innerText = el.symbol;

            body.innerHTML = `
                <div class="flex flex-col md:flex-row gap-10 items-center md:items-start text-right">
                    <div class="w-full md:w-1/3 flex flex-col items-center">
                        <div class="w-40 h-48 bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl border-2 border-blue-500/50 flex flex-col items-center justify-center shadow-2xl relative overflow-hidden">
                            <span class="absolute top-4 right-6 text-xl font-bold text-blue-400 opacity-60">#${el.number}</span>
                            <span class="text-7xl font-black text-white mb-2">${el.symbol}</span>
                            <div class="absolute bottom-0 inset-x-0 h-2 bg-blue-500"></div>
                        </div>
                        <div class="mt-6 space-y-2 text-center">
                           <h2 class="text-4xl font-black text-white">${arName}</h2>
                           <h3 class="text-xl text-slate-400 italic font-light">${el.name}</h3>
                        </div>
                    </div>
                    
                    <div class="w-full md:w-2/3 space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                                <p class="text-xs text-slate-500 mb-1">الكتلة الذرية</p>
                                <p class="text-xl font-bold text-emerald-400">${el.atomic_mass.toFixed(4)} <span class="text-[10px] text-slate-400 uppercase">u</span></p>
                            </div>
                            <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                                <p class="text-xs text-slate-500 mb-1">التصنيف</p>
                                <p class="text-md font-bold text-orange-400">${el.category}</p>
                            </div>
                            <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                                <p class="text-xs text-slate-500 mb-1">درجة الغليان</p>
                                <p class="text-lg font-bold">${el.boil ? el.boil + ' K' : 'غير متوفر'}</p>
                            </div>
                            <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                                <p class="text-xs text-slate-500 mb-1">درجة الانصهار</p>
                                <p class="text-lg font-bold">${el.melt ? el.melt + ' K' : 'غير متوفر'}</p>
                            </div>
                        </div>

                        <div class="bg-blue-500/5 p-6 rounded-2xl border border-blue-500/10">
                            <h4 class="text-blue-400 font-bold mb-3 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                                </svg>
                                نبذة كيميائية
                            </h4>
                            <p class="text-slate-300 leading-relaxed text-sm">
                                ${el.summary}
                            </p>
                        </div>
                    </div>
                </div>
                <button onclick="closeModal()" class="mt-8 w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-2xl transition-all border border-slate-600">إغلاق</button>
            `;
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('details-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Close modal on escape key
        window.onkeydown = (e) => { if(e.key === 'Escape') closeModal(); };

        window.onload = init;
    </script>
</body>
</html>
